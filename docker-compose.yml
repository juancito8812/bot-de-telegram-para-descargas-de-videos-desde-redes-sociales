services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-downloader-bot
    restart: always
    environment:
      # ── Requerido ─────────────────────────
      - BOT_TOKEN=${BOT_TOKEN:?Se requiere BOT_TOKEN}

      # ── Opcional ──────────────────────────
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DOWNLOAD_DIR=/app/downloads
      - LOG_DIR=/app/logs
    volumes:
      # Persistir descargas y logs fuera del contenedor
      - ./downloads:/app/downloads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python main.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
